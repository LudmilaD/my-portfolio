<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludmila Vision | Official Portfolio</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background-color: #0b0b0e; color: #ffffff; }
        header { text-align: center; padding: 60px 20px 20px; }
        header h1 { font-size: 3em; margin: 0; letter-spacing: 4px; font-weight: 800; text-transform: uppercase; }
        header p { color: #666; margin-top: 10px; font-size: 1.1em; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* ГЛАВНОЕ МЕНЮ */
        .main-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
        .menu-card { position: relative; height: 400px; border-radius: 20px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.4s; }
        .menu-card:hover { transform: translateY(-10px); border-color: #a87ffb; }
        .menu-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transition: 0.6s; }
        .menu-card:hover img { opacity: 0.7; transform: scale(1.05); }
        .menu-card h2 { position: absolute; top: 50%; left: 0; width: 100%; text-align: center; transform: translateY(-50%); margin: 0; font-size: 2em; letter-spacing: 2px; }

        /* СЕТКА ГАЛЕРЕИ (ЦЕНТРИРОВАННАЯ) */
        .gallery-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        
        .media-card { 
            position: relative; 
            background: #16161a; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #222; 
            transition: 0.3s; 
            cursor: pointer;
            width: 300px; /* Фиксируем ширину для аккуратности */
        }
        .media-card:hover { border-color: #a87ffb; transform: scale(1.02); }
        .media-card img, .media-card video { width: 100%; display: block; height: auto; }

        /* КНОПКА НАЗАД */
        .back-btn { display: inline-block; margin-bottom: 30px; padding: 12px 30px; background: #1a1a1e; color: #fff; border-radius: 50px; cursor: pointer; border: 1px solid #333; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: #a87ffb; border-color: #a87ffb; }

        /* МОДАЛЬНОЕ ОКНО (ПОПАП) */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content-box { position: relative; max-width: 90%; max-height: 90%; display: flex; align-items: center; justify-content: center; }
        .modal-item { max-width: 100%; max-height: 90vh; border-radius: 8px; display: none; object-fit: contain; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .close-modal { position: absolute; top: -50px; right: 0; color: #fff; font-size: 40px; cursor: pointer; opacity: 0.7; }
        .close-modal:hover { opacity: 1; }

        #gallery-photos, #gallery-videos { display: none; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>LUDMILA VISION</h1>
    <p>Создаю визуальные истории с помощью видеомонтажа и нейросетей.</p>
</header>

<div class="container">
    <div id="home-view" class="main-menu">
        <div class="menu-card" onclick="showSection('gallery-photos')">
            <img src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?auto=format&fit=crop&w=1000">
            <h2>📸 PHOTOGRAPHY</h2>
        </div>
        <div class="menu-card" onclick="showSection('gallery-videos')">
            <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=1000">
            <h2>🎬 VIDEO & AI</h2>
        </div>
    </div>

    <div id="gallery-photos">
        <button class="back-btn" onclick="showSection('home-view')">← НАЗАД К МЕНЮ</button>
        <div class="gallery-container" id="p-list"></div>
    </div>

    <div id="gallery-videos">
        <button class="back-btn" onclick="showSection('home-view')">← НАЗАД К МЕНЮ</button>
        <div class="gallery-container" id="v-list"></div>
    </div>
</div>

<div id="mediaModal" class="modal" onclick="closePopup()">
    <div class="modal-content-box" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closePopup()">&times;</span>
        <img id="pop-img" class="modal-item">
        <video id="pop-video" class="modal-item" controls autoplay></video>
    </div>
</div>

<script>
    function showSection(id) {
        document.getElementById('home-view').style.display = (id === 'home-view' ? 'grid' : 'none');
        document.getElementById('gallery-photos').style.display = (id === 'gallery-photos' ? 'block' : 'none');
        document.getElementById('gallery-videos').style.display = (id === 'gallery-videos' ? 'block' : 'none');
        window.scrollTo(0, 0);
    }

    function openPopup(src, type) {
        const modal = document.getElementById('mediaModal');
        const img = document.getElementById('pop-img');
        const vid = document.getElementById('pop-video');
        
        modal.style.display = 'flex';
        img.style.display = 'none';
        vid.style.display = 'none';

        if (type === 'photo') {
            img.src = src; img.style.display = 'block';
        } else {
            vid.src = src; vid.style.display = 'block'; vid.play();
        }
    }

    function closePopup() {
        const modal = document.getElementById('mediaModal');
        const vid = document.getElementById('pop-video');
        modal.style.display = 'none';
        vid.pause(); vid.src = "";
    }

    // ЗАГРУЗКА
    fetch('data/works.json').then(r => r.json()).then(data => {
        const pList = document.getElementById('p-list');
        const vList = document.getElementById('v-list');
        
        data.items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'media-card';
            
            if(item.type === 'photo') {
                card.innerHTML = `<img src="${item.src}" onclick="openPopup('${item.src}', 'photo')">`;
                pList.appendChild(card);
            } else {
                card.innerHTML = `<video autoplay muted loop playsinline src="${item.src}" onclick="openPopup('${item.src}', 'video')"></video>`;
                vList.appendChild(card);
            }
        });
    });
</script>
</body>
</html>
