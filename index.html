<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Video Editing & AI</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        /* === ДИЗАЙН САЙТА === */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background-color: #0d0d12; color: #ffffff; }
        header { text-align: center; padding: 50px 20px 20px; }
        header h1 { font-size: 3em; margin: 0; letter-spacing: 2px; }
        header p { color: #888; font-size: 1.2em; max-width: 600px; margin: 10px auto; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
        .category-card { background-color: #1a1a24; border-radius: 15px; overflow: hidden; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; text-align: center; border: 1px solid #2a2a35; }
        .category-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(100, 100, 255, 0.1); }
        .category-card img { width: 100%; height: 300px; object-fit: cover; opacity: 0.8; transition: opacity 0.3s; }
        .category-card:hover img { opacity: 1; }
        .category-card h2 { padding: 20px; margin: 0; font-size: 1.8em; }
        .media-item { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; cursor: pointer; transition: transform 0.3s; }
        .media-item:hover { transform: scale(1.03); }
        video.media-item { background-color: #000; cursor: default; }
        .back-btn { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background-color: #2a2a35; color: white; border-radius: 8px; text-decoration: none; cursor: pointer; border: none; font-size: 1em; }
        .back-btn:hover { background-color: #3f3f5a; }
        #gallery-photos, #gallery-videos { display: none; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); align-items: center; justify-content: center; }
        .modal-content { max-width: 90%; max-height: 90%; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; top: 20px; right: 40px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; }
        footer { text-align: center; padding: 50px 20px; margin-top: 50px; border-top: 1px solid #2a2a35; }
        .contact-link { color: #a87ffb; text-decoration: none; font-size: 1.2em; }
    </style>
</head>
<body>
    <header>
        <h1>Your Name</h1>
        <p>Hi! I specialize in video editing and creating visual content using AI. Here is a collection of my best work.</p>
    </header>

    <div class="container">
        <div id="home-view" class="grid">
            <div class="category-card" onclick="showSection('gallery-photos')">
                <img src="https://images.unsplash.com/photo-1554080353-a576cf803bda?auto=format&fit=crop&w=800&q=80" alt="Photography Preview">
                <h2>📸 Photography</h2>
            </div>
            <div class="category-card" onclick="showSection('gallery-videos')">
                <img src="https://images.unsplash.com/photo-1536240478700-b869070f9279?auto=format&fit=crop&w=800&q=80" alt="Video Preview">
                <h2>🎬 Video & AI</h2>
            </div>
        </div>

        <div id="gallery-photos">
            <button class="back-btn" onclick="showSection('home-view')">← Back to Categories</button>
            <h2>My Photography</h2>
            <div class="grid" id="photo-container">
                <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=800&q=80" class="media-item" onclick="openModal(this.src)">
                <img src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?auto=format&fit=crop&w=800&q=80" class="media-item" onclick="openModal(this.src)">
            </div>
        </div>

        <div id="gallery-videos">
            <button class="back-btn" onclick="showSection('home-view')">← Back to Categories</button>
            <h2>Video Editing & AI Clips</h2>
            <div class="grid" id="video-container">
                <video controls class="media-item">
                    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="expandedImg">
    </div>

    <footer>
        <h2>Get in Touch</h2>
        <p>Open to new projects and collaborations.</p>
        <a href="https://t.me/ТВОЙ_НИК" target="_blank" class="contact-link">Message me on Telegram</a>
    </footer>

    <script>
        // Скрипт переключения разделов
        function showSection(sectionId) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('gallery-photos').style.display = 'none';
            document.getElementById('gallery-videos').style.display = 'none';
            
            if (sectionId === 'home-view') {
                document.getElementById(sectionId).style.display = 'grid';
            } else {
                document.getElementById(sectionId).style.display = 'block';
            }
            window.scrollTo(0, 0);
        }

        function openModal(imageSrc) {
            document.getElementById('imageModal').style.display = 'flex';
            document.getElementById('expandedImg').src = imageSrc;
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // --- МОТОРЧИК: Загрузка работ из Админки ---
        document.addEventListener('DOMContentLoaded', () => {
            fetch('data/works.json')
                .then(response => response.json())
                .then(data => {
                    if(data && data.items && data.items.length > 0) {
                        const photoGallery = document.getElementById('photo-container');
                        const videoGallery = document.getElementById('video-container');
                        
                        // Очищаем заглушки, раз у нас есть свои работы!
                        photoGallery.innerHTML = ''; 
                        videoGallery.innerHTML = '';

                        // Рисуем твои файлы
                        data.items.forEach(item => {
                            if(item.type === 'photo') {
                                photoGallery.innerHTML += `<img src="${item.src}" class="media-item" onclick="openModal(this.src)">`;
                            } else if (item.type === 'video') {
                                videoGallery.innerHTML += `<video controls class="media-item"><source src="${item.src}" type="video/mp4"></video>`;
                            }
                        });
                    }
                })
                .catch(err => console.log('Читаем заглушки. Твои работы еще не добавлены.'));
        });

        // --- СКРИПТ АВТОРИЗАЦИИ ---
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
                }
            });
        }
    </script>
</body>
</html>
