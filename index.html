<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludmila Vision | Portfolio FINAL</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background-color: #0d0d12; color: #ffffff; }
        header { text-align: center; padding: 50px 20px 10px; }
        header h1 { font-size: 3em; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        header p { color: #888; margin-top: 10px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* ГЛАВНЫЕ КНОПКИ (ДВЕ ОДИНАКОВЫЕ ПЛИТКИ) */
        .main-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        @media (max-width: 768px) { .main-menu { grid-template-columns: 1fr; } }
        
        .menu-card { position: relative; height: 350px; border-radius: 15px; overflow: hidden; cursor: pointer; border: 1px solid #2a2a35; transition: 0.3s; }
        .menu-card:hover { transform: translateY(-5px); border-color: #a87ffb; }
        .menu-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.5s; }
        .menu-card:hover img { opacity: 0.8; transform: scale(1.05); }
        .menu-card h2 { position: absolute; top: 50%; left: 0; width: 100%; text-align: center; transform: translateY(-50%); margin: 0; font-size: 1.8em; text-shadow: 2px 2px 10px #000; }

        /* СЕТКА (ДЛЯ ФОТО И ВИДЕО) */
        .gallery-grid { column-count: 3; column-gap: 20px; margin-top: 30px; }
        @media (max-width: 900px) { .gallery-grid { column-count: 2; } }
        @media (max-width: 500px) { .gallery-grid { column-count: 1; } }

        .media-box { display: inline-block; width: 100%; margin-bottom: 20px; break-inside: avoid; border-radius: 12px; overflow: hidden; border: 1px solid #2a2a35; background: #1a1a24; transition: 0.3s; cursor: pointer; }
        .media-box:hover { border-color: #a87ffb; transform: scale(1.02); }
        .media-box img, .media-box video { width: 100%; display: block; height: auto; }

        /* КНОПКА НАЗАД */
        .back-btn { display: inline-block; margin-bottom: 20px; padding: 10px 25px; background: #2a2a35; color: #fff; border-radius: 50px; cursor: pointer; border: none; font-weight: bold; }
        .back-btn:hover { background: #a87ffb; }

        /* ПОПАП (УМНЫЙ) */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); align-items: center; justify-content: center; }
        .modal-wrap { position: relative; width: 90%; height: 90%; display: flex; align-items: center; justify-content: center; }
        .modal-content { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; display: none; }
        .close { position: absolute; top: -40px; right: 0; color: #fff; font-size: 40px; cursor: pointer; }

        #gallery-photos, #gallery-videos { display: none; }
    </style>
</head>
<body>

<header>
    <h1>LUDMILA VISION</h1>
    <p>Создаю визуальные истории с помощью видеомонтажа и нейросетей.</p>
</header>

<div class="container">
    <div id="home-view" class="main-menu">
        <div class="menu-card" onclick="showSection('gallery-photos')">
            <img src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?auto=format&fit=crop&w=1000">
            <h2>📸 PHOTOGRAPHY</h2>
        </div>
        <div class="menu-card" onclick="showSection('gallery-videos')">
            <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=1000">
            <h2>🎬 VIDEO & AI</h2>
        </div>
    </div>

    <div id="gallery-photos">
        <button class="back-btn" onclick="showSection('home-view')">← Назад</button>
        <div class="gallery-grid" id="p-cont"></div>
    </div>

    <div id="gallery-videos">
        <button class="back-btn" onclick="showSection('home-view')">← Назад</button>
        <div class="gallery-grid" id="v-cont"></div>
    </div>
</div>

<div id="mediaModal" class="modal" onclick="closeM()">
    <div class="modal-wrap" onclick="event.stopPropagation()">
        <span class="close" onclick="closeM()">&times;</span>
        <img id="m-img" class="modal-content">
        <video id="m-video" class="modal-content" controls autoplay></video>
    </div>
</div>

<script>
    function showSection(id) {
        document.getElementById('home-view').style.display = (id === 'home-view' ? 'grid' : 'none');
        document.getElementById('gallery-photos').style.display = (id === 'gallery-photos' ? 'block' : 'none');
        document.getElementById('gallery-videos').style.display = (id === 'gallery-videos' ? 'block' : 'none');
        window.scrollTo(0, 0);
    }

    function openM(src, type) {
        const m = document.getElementById('mediaModal');
        const img = document.getElementById('m-img');
        const vid = document.getElementById('m-video');
        m.style.display = 'flex';
        img.style.display = 'none';
        vid.style.display = 'none';

        if (type === 'photo') {
            img.src = src; img.style.display = 'block';
        } else {
            vid.src = src; vid.style.display = 'block'; vid.play();
        }
    }

    function closeM() {
        const m = document.getElementById('mediaModal');
        const vid = document.getElementById('m-video');
        m.style.display = 'none';
        vid.pause(); vid.src = "";
    }

    // Загрузка данных
    fetch('data/works.json').then(r => r.json()).then(data => {
        const pCont = document.getElementById('p-cont');
        const vCont = document.getElementById('v-cont');
        data.items.forEach(item => {
            const box = document.createElement('div');
            box.className = 'media-box';
            if(item.type === 'photo') {
                box.innerHTML = `<img src="${item.src}" onclick="openM('${item.src}', 'photo')">`;
                pCont.appendChild(box);
            } else {
                box.innerHTML = `<video autoplay muted loop playsinline src="${item.src}" onclick="openM('${item.src}', 'video')"></video>`;
                vCont.appendChild(box);
            }
        });
    });
</script>
</body>
</html>
