<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludmila Vision | Portfolio</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background-color: #0d0d12; color: #ffffff; }
        header { text-align: center; padding: 50px 20px 20px; }
        header h1 { font-size: 3em; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        header p { color: #888; font-size: 1.1em; max-width: 600px; margin: 10px auto; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* СЕТКА PINTEREST */
        .grid { column-count: 3; column-gap: 20px; margin-top: 40px; }
        @media (max-width: 900px) { .grid { column-count: 2; } }
        @media (max-width: 500px) { .grid { column-count: 1; } }

        /* КОНТЕЙНЕР КАРТОЧКИ */
        .media-item-container { display: inline-block; width: 100%; margin-bottom: 20px; break-inside: avoid; border-radius: 15px; overflow: hidden; background: #1a1a24; border: 1px solid #2a2a35; transition: 0.3s; }
        .media-item-container:hover { transform: translateY(-5px); border-color: #a87ffb; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        .media-item { width: 100%; height: auto; display: block; cursor: pointer; }

        /* КНОПКА НАЗАД */
        .back-btn { display: inline-block; margin-bottom: 30px; padding: 12px 25px; background: #2a2a35; color: white; border-radius: 50px; text-decoration: none; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: #a87ffb; }

        #gallery-photos, #gallery-videos { display: none; }

        /* МОДАЛЬНОЕ ОКНО (УМНЫЙ ПОПАП) */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content-wrapper { position: relative; max-width: 95%; max-height: 95%; display: flex; align-items: center; justify-content: center; }
        
        /* Адаптация контента */
        .modal-content { max-width: 100%; max-height: 90vh; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); display: none; }
        video.modal-content { outline: none; }

        .close-btn { position: absolute; top: -50px; right: 0; color: white; font-size: 35px; cursor: pointer; font-family: serif; }
        
        footer { text-align: center; padding: 60px 20px; border-top: 1px solid #2a2a35; margin-top: 50px; opacity: 0.6; }
        .contact-link { color: #a87ffb; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>Ludmila Vision</h1>
    <p>Создаю визуальные истории с помощью видеомонтажа и нейросетей.</p>
</header>

<div class="container">
    <div id="home-view">
        <div class="grid">
            <div class="media-item-container" onclick="showSection('gallery-photos')">
                <img src="https://images.unsplash.com/photo-1554080353-a576cf803bda?auto=format&fit=crop&w=800&q=80" class="media-item">
                <div style="padding: 15px; text-align: center; font-weight: bold;">📸 PHOTOGRAPHY</div>
            </div>
            <div class="media-item-container" onclick="showSection('gallery-videos')">
                <img src="https://images.unsplash.com/photo-1536240478700-b869070f9279?auto=format&fit=crop&w=800&q=80" class="media-item">
                <div style="padding: 15px; text-align: center; font-weight: bold;">🎬 VIDEO & AI</div>
            </div>
        </div>
    </div>

    <div id="gallery-photos">
        <button class="back-btn" onclick="showSection('home-view')">← Назад</button>
        <div class="grid" id="photo-container"></div>
    </div>

    <div id="gallery-videos">
        <button class="back-btn" onclick="showSection('home-view')">← Назад</button>
        <div class="grid" id="video-container"></div>
    </div>
</div>

<div id="mediaModal" class="modal" onclick="closeModal()">
    <div class="modal-content-wrapper" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img id="modalImg" class="modal-content">
        <video id="modalVideo" class="modal-content" controls autoplay></video>
    </div>
</div>

<footer>
    <p>© 2026 Ludmila Vision • <a href="https://t.me/ТВОЙ_НИК" class="contact-link">Telegram</a></p>
</footer>

<script>
    function showSection(sectionId) {
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('gallery-photos').style.display = 'none';
        document.getElementById('gallery-videos').style.display = 'none';
        document.getElementById(sectionId).style.display = 'block';
        window.scrollTo(0, 0);
    }

    // УМНОЕ ОТКРЫТИЕ ПОПАПА
    function openMedia(src, type) {
        const modal = document.getElementById('mediaModal');
        const img = document.getElementById('modalImg');
        const video = document.getElementById('modalVideo');

        modal.style.display = 'flex';
        img.style.display = 'none';
        video.style.display = 'none';
        video.pause(); // На всякий случай стопаем старое видео

        if (type === 'photo') {
            img.src = src;
            img.style.display = 'block';
        } else {
            video.src = src;
            video.style.display = 'block';
            video.play();
        }
    }

    function closeModal() {
        const modal = document.getElementById('mediaModal');
        const video = document.getElementById('modalVideo');
        modal.style.display = 'none';
        video.pause(); // Чтобы звук не шел после закрытия
        video.src = ""; // Очищаем путь
    }

    // ЗАГРУЗКА КОНТЕНТА
    document.addEventListener('DOMContentLoaded', () => {
        fetch('data/works.json').then(r => r.json()).then(data => {
            if(data && data.items) {
                const pCont = document.getElementById('photo-container');
                const vCont = document.getElementById('video-container');

                data.items.forEach(item => {
                    const wrap = document.createElement('div');
                    wrap.className = 'media-item-container';

                    if(item.type === 'photo') {
                        wrap.innerHTML = `<img src="${item.src}" class="media-item" onclick="openMedia('${item.src}', 'photo')">`;
                        pCont.appendChild(wrap);
                    } else {
                        // В сетке показываем видео без звука, которое само играет
                        wrap.innerHTML = `
                            <video autoplay muted loop playsinline class="media-item" onclick="openMedia('${item.src}', 'video')">
                                <source src="${item.src}" type="video/mp4">
                            </video>`;
                        vCont.appendChild(wrap);
                    }
                });
            }
        }).catch(e => console.log('Данные еще не загружены.'));
    });

    if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
            if (!user) {
                window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
            }
        });
    }
</script>

</body>
</html>
